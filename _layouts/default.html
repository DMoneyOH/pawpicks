<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ site.baseurl }}/" class="site-logo">
        <span class="logo-paw">🐾</span>
        <span class="logo-text">PawPicks</span>
      </a>
      <nav class="site-nav">
        <a href="{{ site.baseurl }}/">Home</a>
        <a href="{{ site.baseurl }}/dogs/">Dogs</a>
        <a href="{{ site.baseurl }}/cats/">Cats</a>
        <a href="{{ site.baseurl }}/about/" class="nav-cta">About</a>
      </nav>
      <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
    </div>
  </header>
  <main class="site-main">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="logo-text">🐾 PawPicks</span>
        <p>Honest reviews for pet owners who care.</p>
      </div>
      <div class="footer-links">
        <a href="{{ site.baseurl }}/">Reviews</a>
        <a href="{{ site.baseurl }}/dogs/">Dogs</a>
        <a href="{{ site.baseurl }}/cats/">Cats</a>
      </div>
    </div>
    <div class="footer-legal">
      <p>As an Amazon Associate and Chewy affiliate, PawPicks earns from qualifying purchases — at no extra cost to you.</p>
      <p>&copy; {{ site.time | date: '%Y' }} PawPicks</p>
    </div>
  </footer>
  <script>
    document.querySelector('.nav-toggle')?.addEventListener('click', () => {
      document.querySelector('.site-nav').classList.toggle('open');
    });
  </script>
</body>
</html>
