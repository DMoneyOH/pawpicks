name: Stage 1 — Generate Articles

on:
  schedule:
    # Mon + Thu 3:15 AM ET = 8:15 UTC (EDT, Apr-Nov)
    # Winter (EST): shifts to 8:15 UTC = 3:15 AM EST — same expression, no drift
    - cron: '15 8 * * 1,4'
  workflow_dispatch:
    inputs:
      force_cap:
        description: 'Override article cap (1 or 2)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "HappyPet Bot"
          git config user.email "hello@happypetproductreviews.com"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --quiet -r requirements.txt

      - name: Write GCP service account key
        run: |
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > happypet-sheets-key.json
          echo "Key written: $(wc -c < happypet-sheets-key.json) bytes"

      - name: Check products.json queue
        id: queue_check
        run: |
          count=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('products.json'))
              print(len(data))
          except Exception:
              print(0)
          ")
          echo "queue_count=${count}" >> "$GITHUB_OUTPUT"
          echo "Products in queue: ${count}"
          if [ "$count" -eq 0 ]; then
            echo "Queue empty — nothing to generate"
          fi

      - name: Determine cap
        id: cap
        run: |
          OVERRIDE="${{ github.event.inputs.force_cap }}"
          if [ -n "$OVERRIDE" ]; then
            echo "cap=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Generate cap (override): ${OVERRIDE}"
          else
            DOW=$(date '+%u')
            if [ "$DOW" = "1" ]; then
              echo "cap=2" >> "$GITHUB_OUTPUT"
              echo "Monday run — cap 2"
            else
              echo "cap=1" >> "$GITHUB_OUTPUT"
              echo "Thursday run — cap 1"
            fi
          fi

      - name: Run generator
        if: steps.queue_check.outputs.queue_count != '0'
        env:
          MAX_ARTICLES: ${{ steps.cap.outputs.cap }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          HAPPYPET_SHEET_ID_DOGS: ${{ secrets.HAPPYPET_SHEET_ID_DOGS }}
          HAPPYPET_SHEET_ID_CATS: ${{ secrets.HAPPYPET_SHEET_ID_CATS }}
          HAPPYPET_SHEET_ID_HOME: ${{ secrets.HAPPYPET_SHEET_ID_HOME }}
          HAPPYPET_SHEET_ID_FOOD: ${{ secrets.HAPPYPET_SHEET_ID_FOOD }}
          HAPPYPET_SHEET_ID_TOYS: ${{ secrets.HAPPYPET_SHEET_ID_TOYS }}
          HAPPYPET_SHEET_ID_HEALTH: ${{ secrets.HAPPYPET_SHEET_ID_HEALTH }}
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_ACCOUNT: ${{ secrets.GMAIL_ACCOUNT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 generate_posts.py

      - name: Commit generated support files
        run: |
          # Stage pin images, pin queue JSONs, updated products.json — NOT _posts/
          # _posts/ is committed by Stage 2 after the publish window, triggering deploy
          git add assets/images/pins/ _pin_queue/ products.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No support files changed — no commit needed"
          else
            git commit -m "auto: stage support files $(date '+%Y-%m-%d')"
            git push origin main
            echo "Committed support files"
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: generate-logs-${{ github.run_id }}
          path: LOGS/
          if-no-files-found: ignore
          retention-days: 14
