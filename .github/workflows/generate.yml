name: Stage 1 — Generate Articles

on:
  schedule:
    # Mon + Thu 3:15 AM ET = 8:15 UTC (EDT, Apr-Nov)
    # Winter (EST): shifts to 8:15 UTC = 3:15 AM EST — same expression, no drift
    - cron: '15 8 * * 1,4'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "HappyPet Bot"
          git config user.email "hello@happypetproductreviews.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            pillow==12.1.1 \
            gspread==6.2.1 \
            google-auth==2.49.1 \
            python-dotenv==1.2.2

      - name: Write GCP service account key
        run: |
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > happypet-sheets-key.json
          echo "Key written: $(wc -c < happypet-sheets-key.json) bytes"

      - name: Check products.json queue
        id: queue_check
        run: |
          count=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('products.json'))
              print(len(data))
          except Exception:
              print(0)
          ")
          echo "queue_count=${count}" >> "$GITHUB_OUTPUT"
          echo "Products in queue: ${count}"
          if [ "$count" -eq 0 ]; then
            echo "Queue empty — nothing to generate"
          fi

      - name: Run generator
        if: steps.queue_check.outputs.queue_count != '0'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          HAPPYPET_SHEET_ID_DOGS: ${{ secrets.HAPPYPET_SHEET_ID_DOGS }}
          HAPPYPET_SHEET_ID_CATS: ${{ secrets.HAPPYPET_SHEET_ID_CATS }}
          HAPPYPET_SHEET_ID_HOME: ${{ secrets.HAPPYPET_SHEET_ID_HOME }}
          HAPPYPET_SHEET_ID_FOOD: ${{ secrets.HAPPYPET_SHEET_ID_FOOD }}
          HAPPYPET_SHEET_ID_TOYS: ${{ secrets.HAPPYPET_SHEET_ID_TOYS }}
          HAPPYPET_SHEET_ID_HEALTH: ${{ secrets.HAPPYPET_SHEET_ID_HEALTH }}
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_ACCOUNT: ${{ secrets.GMAIL_ACCOUNT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 generate_posts.py

      - name: Commit generated files
        run: |
          # Stage new posts, pin images, pin queue JSONs, updated products.json
          git add _posts/ assets/images/pins/ _pin_queue/ products.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing generated — no commit needed"
          else
            COUNT=$(git diff --cached --name-only | grep '^_posts/' | wc -l)
            git commit -m "auto: generate $(date '+%Y-%m-%d') [${COUNT} article(s) staged]"
            git push origin main
            echo "Committed and pushed ${COUNT} staged article(s)"
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generate-logs-${{ github.run_id }}
          path: LOGS/
          if-no-files-found: ignore
          retention-days: 14
