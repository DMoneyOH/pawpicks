name: Facebook Token Health Check

on:
  schedule:
    - cron: '0 10 1 * *'  # 1st of every month at 10:00 AM UTC
  workflow_dispatch:        # manual trigger

jobs:
  token-health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Facebook Page Token
        run: |
          RESPONSE=$(curl -s "https://graph.facebook.com/debug_token?input_token=${{ secrets.FACEBOOK_PAGE_TOKEN }}&access_token=${{ secrets.FACEBOOK_PAGE_TOKEN }}")

          IS_VALID=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('is_valid',''))" 2>/dev/null || echo "")
          EXPIRES_AT=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('expires_at',''))" 2>/dev/null || echo "")
          TOKEN_TYPE=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('type',''))" 2>/dev/null || echo "")
          ERROR=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',{}).get('message',''))" 2>/dev/null || echo "")

          echo "Token type   : $TOKEN_TYPE"
          echo "Is valid     : $IS_VALID"
          echo "Expires at   : $EXPIRES_AT"

          if [ -n "$ERROR" ]; then
            echo "ERROR: Facebook API returned an error: $ERROR"
            exit 1
          fi

          if [ "$IS_VALID" != "True" ]; then
            echo "ERROR: Token is no longer valid. Regenerate via /me/accounts and update FACEBOOK_PAGE_TOKEN secret."
            exit 1
          fi

          if [ "$TOKEN_TYPE" != "PAGE" ]; then
            echo "ERROR: Token type is '$TOKEN_TYPE', expected PAGE. Replace FACEBOOK_PAGE_TOKEN with a proper Page token."
            exit 1
          fi

          if [ "$EXPIRES_AT" != "0" ]; then
            echo "WARNING: Token has an expiry ($EXPIRES_AT). Should be 0 for a permanent Page token."
            exit 1
          fi

          echo "PASS: Page token is valid, permanent, and correctly typed."
