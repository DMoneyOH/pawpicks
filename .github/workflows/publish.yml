name: Stage 2 — Publish Articles

on:
  schedule:
    # Mon + Thu 7:00 AM ET = 12:00 UTC (EDT, Apr-Nov)
    - cron: '0 12 * * 1,4'
  workflow_dispatch:
    inputs:
      force_cap:
        description: 'Override post cap (1 or 2)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "HappyPet Bot"
          git config user.email "hello@happypetproductreviews.com"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --quiet -r requirements.txt

      - name: Check for stale pending-slugs (missed pins guard)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PENDING="_pin_queue/.pending-slugs"
          if [ -f "$PENDING" ]; then
            FILE_DATE=$(git log -1 --format="%ct" -- "$PENDING" 2>/dev/null || echo "0")
            NOW=$(date +%s)
            AGE=$(( NOW - FILE_DATE ))
            if [ "$AGE" -gt 86400 ]; then
              STALE_SLUGS=$(cat "$PENDING")
              echo "WARNING: .pending-slugs is ${AGE}s old — pins may not have fired for: ${STALE_SLUGS}"
              gh issue create \
                --repo DMoneyOH/HappyPet \
                --title "⚠️ Missed pins detected: stale .pending-slugs" \
                --body "$(printf '.pending-slugs was not consumed by Stage 3 within 24h.\n\nSlugs affected: %s\n\nManually trigger pin.yml with these slugs, or investigate deploy/S3 failure.\n\n_Auto-generated by publish.yml_' "${STALE_SLUGS}")" \
                --assignee DMoneyOH || true
            fi
          fi

      - name: Write GCP service account key
        run: |
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > happypet-sheets-key.json

      - name: Determine post cap
        id: cap
        run: |
          OVERRIDE="${{ github.event.inputs.force_cap }}"
          if [ -n "$OVERRIDE" ]; then
            echo "cap=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Post cap (override): ${OVERRIDE}"
          else
            DOW=$(date '+%u')
            if [ "$DOW" = "1" ]; then
              echo "cap=2" >> "$GITHUB_OUTPUT"
              echo "Monday run — cap 2"
            else
              echo "cap=1" >> "$GITHUB_OUTPUT"
              echo "Thursday run — cap 1"
            fi
          fi

      - name: Find and date unpublished posts
        id: stage
        run: |
          CAP="${{ steps.cap.outputs.cap }}"
          TODAY=$(date '+%Y-%m-%d')
          mapfile -t ALL_NEW < <(git ls-files _posts/DRAFT-*.md | sort)
          TOTAL=${#ALL_NEW[@]}
          echo "Found ${TOTAL} DRAFT post(s)"
          if [ "$TOTAL" -eq 0 ]; then
            echo "nothing_to_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "nothing_to_publish=false" >> "$GITHUB_OUTPUT"
          SELECTED=("${ALL_NEW[@]:0:$CAP}")
          SLUGS=()
          URLS=()
          for p in "${SELECTED[@]}"; do
            fname=$(basename "$p" .md)
            slug="${fname#DRAFT-}"
            SLUGS+=("$slug")
            new_path="_posts/${TODAY}-${slug}.md"
            git rm --cached "$p" -q 2>/dev/null || true
            [ "$p" != "$new_path" ] && mv "$p" "$new_path" && echo "  DATED: $p -> $new_path"
            sed -i "s/^date: .*/date: ${TODAY}/" "$new_path"
            git add "$new_path"
            pin_img="assets/images/pins/${slug}.jpg"
            [ -f "$pin_img" ] && git add "$pin_img" && echo "  STAGED pin: $pin_img"
            pin_json="_pin_queue/${slug}.json"
            if [ -f "$pin_json" ]; then
              art_url=$(python3 -c "import json; d=json.load(open('${pin_json}')); print(d.get('article_url','').split('?')[0].rstrip('/')+'/')")
              URLS+=("$art_url")
              echo "  URL: $art_url"
            fi
          done
          SLUGS_CSV=$(IFS=','; echo "${SLUGS[*]}")
          URLS_CSV=$(IFS=','; echo "${URLS[*]}")
          echo "slugs=${SLUGS_CSV}" >> "$GITHUB_OUTPUT"
          echo "urls=${URLS_CSV}"   >> "$GITHUB_OUTPUT"
          echo "publish_count=${#SELECTED[@]}" >> "$GITHUB_OUTPUT"
          REMAINING=$(( TOTAL - ${#SELECTED[@]} ))
          echo "remaining=${REMAINING}" >> "$GITHUB_OUTPUT"
          echo "Staged ${#SELECTED[@]} post(s): ${SLUGS_CSV}"

      - name: Write pending-slugs for Stage 3
        if: steps.stage.outputs.nothing_to_publish == 'false'
        run: |
          echo "${{ steps.stage.outputs.slugs }}" > _pin_queue/.pending-slugs
          git add _pin_queue/.pending-slugs
          echo "Wrote .pending-slugs: ${{ steps.stage.outputs.slugs }}"

      - name: Commit and push
        if: steps.stage.outputs.nothing_to_publish == 'false'
        run: |
          COUNT="${{ steps.stage.outputs.publish_count }}"
          TODAY=$(date '+%Y-%m-%d')
          git commit -m "auto: publish ${TODAY} [${COUNT} post(s)]"
          git push origin main
          echo "Pushed — deploy and pin workflows will follow"

      - name: Queue low — create GitHub issue
        if: steps.stage.outputs.nothing_to_publish == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Measure true supply: unprocessed entries in products.json
          # (topics not yet published to _posts/). This is the authoritative queue depth.
          QUEUE_REMAINING=$(python3 -c "
          import json
          from pathlib import Path
          try:
              products = json.loads(Path('products.json').read_text())
              published = set()
              for md in Path('_posts').glob('2*-*.md'):
                  parts = md.stem.split('-', 3)
                  if len(parts) == 4:
                      published.add(parts[3])
              remaining = [p for p in products if p.get('topic') not in published]
              print(len(remaining))
          except Exception:
              print(999)
          ")
          echo "products.json queue remaining: ${QUEUE_REMAINING}"
          if [ "$QUEUE_REMAINING" -le 3 ]; then
            gh issue create \
              --repo DMoneyOH/HappyPet \
              --title "⚠️ Queue low: ${QUEUE_REMAINING} unprocessed topic(s) in products.json" \
              --body "$(printf 'autopublish queue alert (%s)\n\nOnly **%s** unprocessed topic(s) remain in \`products.json\`.\n\n**Action needed:** Add new topic entries to \`products.json\` and trigger Stage 1 before queue runs dry.\n\n_Auto-generated by publish.yml_' "$(date '+%Y-%m-%d')" "$QUEUE_REMAINING")" \
              --assignee DMoneyOH
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-logs-${{ github.run_id }}
          path: LOGS/
          if-no-files-found: ignore
          retention-days: 14
