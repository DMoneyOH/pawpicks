{% comment %}Hero visual: image LEFT, product cards RIGHT, both in one flex row{% endcomment %}
<div class="hero-graphic-wrap">
  <div class="hero-visual">
    <img
      src="{{ site.baseurl }}/assets/images/happy-pets.png"
      alt="Happy dog and cat"
      class="hero-pet-img"
      loading="eager"
      width="440" height="293">
  </div>
  <div class="hero-cards" id="hero-cards"></div>
</div>

<script>
(function(){
  var CARDS=[
    {emoji:'🏷️',label:'Dog Collars',sub:'Small breed picks',url:'/dog-collars/best-dog-collars-small-breeds/',ha:'#FF6B4A'},
    {emoji:'🧹',label:'Cat Litter',sub:'Odor control rated',url:'/cat-litter/best-cat-litter-odor-control/',ha:'#0D5C63'},
    {emoji:'🦺',label:'No-Pull Harness',sub:'For strong pullers',url:'/dog-harnesses/best-no-pull-dog-harness/',ha:'#FF6B4A'},
    {emoji:'🪵',label:'Cat Scratchers',sub:'That actually last',url:'/cat-scratching/best-cat-scratching-posts/',ha:'#0D5C63'},
    {emoji:'🎾',label:'Dog Toys',sub:'For tough chewers',url:'/dog-toys/best-dog-toys-aggressive-chewers/',ha:'#FF6B4A'},
    {emoji:'💧',label:'Water Fountains',sub:'Cats & dogs love it',url:'/pet-feeding/best-pet-water-fountain/',ha:'#0D5C63'},
    {emoji:'🛏️',label:'Dog Beds',sub:'Large breed comfort',url:'/dog-beds/best-dog-beds-large-breeds/',ha:'#FF6B4A'},
    {emoji:'🥣',label:'Cat Feeders',sub:'Auto-feed made easy',url:'/cat-feeders/best-automatic-cat-feeder/',ha:'#0D5C63'},
    {emoji:'📋',label:'Training Pads',sub:'Puppy essentials',url:'/dog-training/best-puppy-training-pads/',ha:'#FF6B4A'},
    {emoji:'✈️',label:'Cat Carriers',sub:'Vet & travel ready',url:'/cat-carriers/best-cat-carrier-travel/',ha:'#0D5C63'},
  ];
  var picks=CARDS.slice().sort(function(){return Math.random()-.5}).slice(0,2);
  var wrap=document.getElementById('hero-cards');
  if(!wrap)return;
  picks.forEach(function(c,i){
    var a=document.createElement('a');
    a.className='hc'; a.href=c.url;
    a.style.cssText='--ha:'+c.ha+';animation-delay:'+(i*.12)+'s';
    a.innerHTML=
      '<div class="hc-bar"></div>'+
      '<div class="hc-inner">'+
        '<span class="hc-icon">'+c.emoji+'</span>'+
        '<div class="hc-text">'+
          '<strong class="hc-label">'+c.label+'</strong>'+
          '<span class="hc-sub">'+c.sub+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="hc-footer">Read review →</div>';
    wrap.appendChild(a);
  });
})();
</script>
